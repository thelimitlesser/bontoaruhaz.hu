name: Daily Quality Audit

on:
  schedule:
    # Runs at 04:00 AM Central European Time (02:00 UTC) every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 18
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests (Live Site)
      run: npx playwright test tests/site_audit.spec.ts
      env:
        # Explicitly hitting the live site instead of a local build
        PLAYWRIGHT_TEST_BASE_URL: 'https://bontoaruhaz.vercel.app'
        
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
